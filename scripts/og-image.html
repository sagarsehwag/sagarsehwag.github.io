<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200, height=630" />
    <title>Sagar Sehwag · Portfolio OG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 1200px;
        height: 630px;
        background: #0f0f0f;
        font-family: 'Inter', -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 64px 80px;
        overflow: hidden;
      }
      .main {
        display: flex;
        align-items: center;
        gap: 56px;
      }
      .photo {
        width: 240px;
        height: 240px;
        border-radius: 50%;
        overflow: hidden;
        flex-shrink: 0;
        border: 2px solid rgba(59, 130, 246, 0.3);
      }
      .photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .content {
        flex: 1;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(59, 130, 246, 0.15);
        border: 1px solid rgba(59, 130, 246, 0.4);
        color: #3b82f6;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 28px;
        width: fit-content;
      }
      .badge span {
        font-size: 20px;
      }
      h1 {
        font-size: 52px;
        font-weight: 700;
        color: #ffffff;
        line-height: 1.2;
        margin-bottom: 16px;
        letter-spacing: -0.02em;
      }
      .subtitle {
        font-size: 24px;
        color: #a0a0a0;
        line-height: 1.5;
        max-width: 580px;
        margin-bottom: 32px;
      }
      .code-block {
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 20px 24px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        color: #a0a0a0;
        width: fit-content;
      }
      .code-block .key {
        color: #3b82f6;
      }
      .code-block .string {
        color: #22c55e;
      }
      .footer {
        position: absolute;
        bottom: 48px;
        right: 80px;
        font-size: 18px;
        color: #666;
      }
      .gradient-line {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #3b82f6, #22c55e, #a855f7);
      }
    </style>
  </head>
  <body>
    <div class="main">
      {{PHOTO_SECTION}}
      <div class="content">
        <div class="badge"><span>💻</span>Frontend Engineer</div>
        <h1>Sagar Sehwag</h1>
        <p class="subtitle">Building scalable web applications with React, TypeScript, and a focus on long-term engineering quality.</p>
        <div class="code-block">
          <span class="string">Simpplr</span> · <span class="string">Zomato</span> ·
          <span class="key">React</span> · <span class="key">TypeScript</span>
        </div>
      </div>
    </div>
    <div class="footer">sagarsehwag.github.io</div>
    <div class="gradient-line"></div>
  </body>
</html>
